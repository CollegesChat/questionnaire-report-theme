<div
  class="hx:mx-auto hx:flex hx:max-w-screen-xl hx:items-center hx:justify-between hx:py-2"
>
  <!-- left -->
  <div class="hx:flex hx:items-center hx:gap-2">
    <small class="hx:text-sm">
      <a href="https://github.com/imfing/hextra" target="_blank" rel="noopener"
        >Powered by Hextra</a
      >
      <img
        src='{{ "icons/hextra-logo.svg" | relURL }}'
        alt="Hextra logo"
        style="height: 1em; width: 1em"
        class="hx:inline-block hx:ltr:ml-1 hx:rtl:mr-1 hx:align-[-2.5px]"
      />
    </small>
  </div>

  <!-- center -->
  <div
    class="hx:flex-1 hx:text-center hx:text-xs hx:text-gray-600 hx:dark:text-gray-400"
  >
    <a
      href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh-hans"
      target="_blank"
      rel="noopener"
      >CC BY-NC-SA 4.0</a
    >
    | Generated on
    <a
      href="https://github.com/CollegesChat/colleges.chat"
      target="_blank"
      rel="noopener"
      >{{ now.Format "2006-01-02 15:04" }}</a
    >
  </div>

  <!-- right -->
  <div id="social-icon-link" class="hx:flex hx:items-center hx:gap-4">
    <a
      href="https://github.com/CollegesChat"
      title="GitHub"
      class="hx:text-gray-500 hover:hx:text-gray-900 hx:transition-colors"
    >
      <img
        src='{{ "icons/github.svg" | relURL }}'
        alt="GitHub"
        width="26"
        height="26"
      />
    </a>

    <a
      href="https://t.me/joinchat/NPiGbd9ODe0wYjQ1"
      title="Telegram"
      class="hx:text-gray-500 hover:hx:text-gray-900 hx:transition-colors"
    >
      <img
        src='{{ "icons/telegram.svg" | relURL }}'
        alt="Telegram"
        width="26"
        height="26"
      />
    </a>
  </div>
</div>
